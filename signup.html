<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Sift</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js" defer></script>
    <script type="module" src="signup.js" defer></script>

    <!-- Page-specific styles only: Google button + divider + the
         post-signup "check your email" confirmation panel. Reuses
         style.css tokens so it matches the rest of the auth card. -->
    <style>
        .google-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 11px;
            margin-bottom: 20px;
            background: #ffffff;
            color: #1f1f1f;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: border-color 0.12s ease, box-shadow 0.12s ease;
        }

        .google-btn:hover:not(:disabled) {
            border-color: var(--ink);
        }

        .google-btn:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .google-btn svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            color: var(--ink-faint);
            font-size: 12px;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--line);
        }

        /* ---- Post-signup confirmation panel (hidden until needed) ---- */
        .signup-confirm {
            display: none;
            text-align: center;
        }

        .signup-confirm.show {
            display: block;
        }

        .signup-confirm p {
            font-size: 14.5px;
            font-family: 'Inter', sans-serif;
            color: var(--ink-soft);
            line-height: 1.65;
            margin-bottom: 20px;
        }

        .signup-confirm a button {
            width: 100%;
            padding: 11px;
            border: 1px solid var(--ink);
            border-radius: var(--radius);
            background: var(--ink);
            color: var(--bg);
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }
    </style>
</head>
<body class="auth-page">
    <main>
      <div class="navbar">
        <a href="index.html"><img src="images/logo.png" alt="logo"></a>
        <ul class="nav-links">
          <button id="lightBtn">☀️</button>
        </ul>
      </div>

      <div class="auth-page-wrapper">
        <div class="auth-card">
          <h1 id="signupHeading">Sign Up</h1>
          <div class="error-msg" id="signupError"></div>

          <div class="signup-confirm" id="signupConfirm">
            <p>Verification email sent. Please verify your email before logging in.</p>
            <a href="login.html"><button type="button">Go to Login</button></a>
          </div>

          <div id="signupFormWrap">
            <button type="button" class="google-btn" id="googleSignupBtn">
              <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
              </svg>
              Continue with Google
            </button>

            <div class="auth-divider">OR</div>

            <form id="signupForm">
              <input type="email" id="signupEmail" placeholder="Enter Your Email" required><br>
              <input type="password" id="signupPassword" placeholder="Create a Password" required minlength="6"><br>
              <button type="submit" id="signupSubmitBtn">Submit</button>
            </form>
            <p class="switch-link">Already have an account? <a href="login.html">Log in</a></p>
          </div>
        </div>
      </div>
    </main>
</body>
</html>
