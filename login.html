<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIFT</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="login.js" defer></script>
</head>
<body class="auth-page">
    <main>
      <div class="navbar">
        <a href="index.html" style="text-decoration:none; color:inherit;"><h2 class="logo">KuchTohHai</h2></a>
        <ul class="nav-links">
          <button id="lightBtn">☀️</button>
        </ul>
      </div>

      <div class="auth-page-wrapper">
        <div class="auth-card">
          <h1>Login</h1>
          <div class="error-msg" id="loginError"></div>
          <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Enter Your Email" required><br>
            <input type="password" id="loginPassword" placeholder="Enter Your Password" required><br>
            <button type="submit" id="loginSubmitBtn">Submit</button>
          </form>
          <p class="switch-link">Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
      </div>
    </main>
</body>
</html>
